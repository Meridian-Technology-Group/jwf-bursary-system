name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  ci:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Prisma validate/format require DATABASE_URL + DIRECT_URL to be
      # *defined* (not reachable). Dummy values are enough.
      - name: Prisma schema validation
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x
          DIRECT_URL: postgresql://x:x@localhost:5432/x
        run: npx prisma validate

      - name: Prisma schema formatting
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x
          DIRECT_URL: postgresql://x:x@localhost:5432/x
        run: npx prisma format --check

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
